<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Blood – AdShubh Lifeline</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="find-blood">
  <div id="site-header"></div>

  <div class="page-header">
    <div class="container">
      <h1>Find Blood</h1>
      <p>Search verified donors by blood group, city, and availability. Results update instantly from live data.</p>
    </div>
  </div>

  <div class="page-content">
    <div class="container">
      <div class="filters-bar reveal">
        <div class="form-group">
          <label for="filterBloodGroup">Blood Group</label>
          <select id="filterBloodGroup" class="form-select">
            <option value="all">All Blood Groups</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filterCity">City</label>
          <select id="filterCity" class="form-select">
            <option value="all">All Cities</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filterAvailability">Availability</label>
          <select id="filterAvailability" class="form-select">
            <option value="all">All Status</option>
            <option value="available">Available</option>
            <option value="on-call">On Call</option>
            <option value="unavailable">Unavailable</option>
          </select>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px" class="reveal">
        <p class="text-muted" id="resultCount">0 donors found</p>
        <a href="become-donor.html" class="btn btn-outline btn-sm">Become Donor</a>
      </div>

      <div id="searchResults" class="reveal"></div>
    </div>
  </div>

  <div id="site-footer"></div>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages.js"></script>
</body>
</html>
