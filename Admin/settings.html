<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings – AdShubh Lifeline</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-page="settings">
  <div id="admin-root" data-title="Settings">
    <div class="card" style="max-width:560px">
      <form id="settingsForm">
        <div class="form-group">
          <label for="settingSiteName">Platform Name</label>
          <input type="text" id="settingSiteName" class="form-control">
        </div>
        <div class="form-group">
          <label for="settingEmergency">Emergency Contact</label>
          <input type="text" id="settingEmergency" class="form-control">
        </div>
        <div class="form-group">
          <label for="settingEmail">Admin Email</label>
          <input type="email" id="settingEmail" class="form-control">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="settingHealthy">Healthy Threshold (units)</label>
            <input type="number" id="settingHealthy" class="form-control" min="1">
          </div>
          <div class="form-group">
            <label for="settingLow">Low Stock Threshold (units)</label>
            <input type="number" id="settingLow" class="form-control" min="0">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Save Settings</button>
      </form>
    </div>

    <div class="card" style="max-width:560px;margin-top:24px;border-color:var(--critical)">
      <h3 style="color:var(--critical);margin-bottom:8px">Danger Zone</h3>
      <p class="text-muted" style="font-size:.875rem;margin-bottom:16px">Permanently delete all platform data including donors, requests, and notifications.</p>
      <button id="clearData" class="btn btn-danger btn-sm">Clear All Data</button>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/pages.js"></script>
</body>
</html>
